server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for better performance
    location ~* \.(?:css|js|jpg|svg|json)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}
